name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          sw_vers

      # Rust is needed if the repo generates iOS bindings from Rust (cake-ios)
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # If Makefile uses brew deps, add them here as needed (only if build fails)
      - name: Install build deps (best-effort)
        run: |
          brew update
          # Uncomment/add if your build errors mention missing tools:
          # brew install cmake ninja cbindgen protobuf
          true

      - name: Build iOS bindings (if present)
        run: |
          if [ -f "cake-ios/Makefile" ]; then
            echo "Found cake-ios/Makefile, running make ios"
            (cd cake-ios && make ios)
          else
            echo "No cake-ios/Makefile found, skipping make ios"
          fi

      - name: Locate Xcode project and scheme
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          # Try expected folder first
          if [ -d "cake-ios-worker-app" ]; then
            SEARCH_DIR="cake-ios-worker-app"
          else
            SEARCH_DIR="."
          fi

          # Find an xcodeproj
          XCODEPROJ="$(find "$SEARCH_DIR" -maxdepth 3 -name "*.xcodeproj" -print -quit)"
          if [ -z "${XCODEPROJ:-}" ]; then
            echo "No .xcodeproj found under $SEARCH_DIR"
            exit 1
          fi
          echo "Found project: $XCODEPROJ"

          # Extract a scheme (prefer non-test scheme)
          # xcodebuild -list output is plain text; we parse "Schemes:" section.
          SCHEME="$(xcodebuild -list -project "$XCODEPROJ" | awk '
            $0 ~ /^Schemes:/ {inSchemes=1; next}
            inSchemes && NF==0 {exit}
            inSchemes && NF>0 {print $1}
          ' | head -n 1)"

          if [ -z "${SCHEME:-}" ]; then
            echo "Could not detect scheme from xcodebuild -list"
            exit 1
          fi

          echo "Using scheme: $SCHEME"

          echo "xcodeproj=$XCODEPROJ" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build .app without code signing
        shell: bash
        run: |
          set -euo pipefail
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          rm -rf "$DERIVED_DATA"

          # Build for a generic iOS device (will produce an .app, but not installable without signing)
          xcodebuild \
            -project "${{ steps.discover.outputs.xcodeproj }}" \
            -scheme "${{ steps.discover.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

          echo "DerivedData at: $DERIVED_DATA"
          # Find the built .app
          APP_PATH="$(find "$DERIVED_DATA" -type d -name "*.app" -path "*Build/Products/Release-iphoneos*" -print -quit)"
          if [ -z "${APP_PATH:-}" ]; then
            echo "Could not find built .app in DerivedData"
            find "$DERIVED_DATA" -maxdepth 6 -type d -name "*.app" -print || true
            exit 1
          fi

          echo "Built app: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/out"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR/Payload"

          cp -R "$APP_PATH" "$OUT_DIR/Payload/"

          IPA_NAME="Unsigned-${{ steps.discover.outputs.scheme }}.ipa"
          (cd "$OUT_DIR" && /usr/bin/zip -qry "$RUNNER_TEMP/$IPA_NAME" Payload)

          echo "IPA created at: $RUNNER_TEMP/$IPA_NAME"
          ls -lah "$RUNNER_TEMP/$IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: ${{ runner.temp }}/Unsigned-*.ipa
